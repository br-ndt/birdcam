# /etc/birdcam/config.toml -- self-contained birdcam settings.
# Every key is optional; the values below are the code defaults. Two things are NOT here:
#   - rotation: set in the web UI, persisted to <captures>/.rotation
#   - the auth token: BIRDCAM_TOKEN, in /etc/birdcam/env
# This file is per-host (mic_device and resolution differ between machines), so the
# installer seeds it once from this example and never overwrites it afterward.

# capture
low_res       = [640, 480]    # motion-detection + live-stream resolution
high_res      = [1280, 720]   # recorded-clip resolution (code default is 1920x1080; 720p suits a Zero)
fps           = 30
lens_position = 1.4           # fixed focus for Camera Module 3 (diopters)

# motion / clips
motion_threshold = 5000       # changed pixels needed to trigger
quiet_seconds    = 3          # stop the clip after this many seconds of no motion
max_clip_seconds = 120
record_cooldown  = 5          # wait this long after a failed/skipped clip before retrying

# audio
record_audio = true           # false = video-only (skips the mic probe entirely)
mic_device   = "plughw:2,0"   # check `arecord -l`; the card index varies per host

# encoding
video_bitrate = "4M"          # H264Encoder bitrate; accepts "4M" / "4000k" / an int (bps)

# live stream
stream_fps     = 10
stream_quality = 80
thumb_width    = 320

# web + housekeeping
port                = 5000
heartbeat_timeout   = 30       # seconds without a frame before the watchdog restarts capture
min_free_mb         = 500      # below this, prune old clips before recording
retention_target_mb = 1000     # prune down to roughly this
